services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent_challenge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentdb}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentsecret123}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_challenge_app
    restart: unless-stopped
    ports:
      - "${PORT:-4319}:4319"
    environment:
      PORT: 4319
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agentsecret123}@db:5432/${POSTGRES_DB:-agentdb}"
      DATABASE_SSL: "false"
      MODEL_API_BASE_URL: ${MODEL_API_BASE_URL}
      MODEL_API_KEY: ${MODEL_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_SYSTEM_PROMPT: ${MODEL_SYSTEM_PROMPT}
      MODEL_REQUEST_TIMEOUT_MS: ${MODEL_REQUEST_TIMEOUT_MS:-60000}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run db:migrate && npm start"

volumes:
  postgres_data: